<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="230" viewBox="0 0 1000 230" fill="none" role="img" aria-label="James C — Solutions Engineer and Polyglot Builder">
  <defs>
    <!-- Deep cinematic background -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#05070d"/>
      <stop offset="55%" stop-color="#0a0e17"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>

    <!-- Animated aurora gradient for the name -->
    <linearGradient id="aurora" gradientUnits="userSpaceOnUse" x1="300" y1="0" x2="700" y2="0" spreadMethod="reflect">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="35%" stop-color="#4f8cff"/>
      <stop offset="70%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#7c3aed"/>
      <animateTransform attributeName="gradientTransform" type="translate"
        from="-400 0" to="400 0" dur="6s" repeatCount="indefinite"/>
    </linearGradient>

    <radialGradient id="blob1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>

    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="34"/>
    </filter>

    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#2a3350" stroke-width="1" stroke-opacity="0.35"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1000" height="230" rx="16" fill="url(#bg)"/>
  <rect width="1000" height="230" rx="16" fill="url(#grid)"/>

  <!-- Drifting aurora blobs -->
  <circle cx="230" cy="70" r="150" fill="url(#blob1)" filter="url(#soft)">
    <animateTransform attributeName="transform" type="translate"
      values="0 0; 120 40; -40 20; 0 0" dur="14s" repeatCount="indefinite"/>
  </circle>
  <circle cx="780" cy="170" r="160" fill="url(#blob2)" filter="url(#soft)">
    <animateTransform attributeName="transform" type="translate"
      values="0 0; -110 -30; 50 -10; 0 0" dur="16s" repeatCount="indefinite"/>
  </circle>

  <!-- Terminal prompt line -->
  <text x="500" y="66" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace"
        font-size="17" fill="#7d8bb0" letter-spacing="1">
    james@apex-main:~$ whoami
  </text>

  <!-- Name -->
  <text x="500" y="132" text-anchor="middle"
        font-family="'JetBrains Mono','Fira Code','Courier New',monospace"
        font-size="66" font-weight="700" letter-spacing="4" fill="url(#aurora)">
    JAMES C<tspan fill="#4f8cff">_<animate attributeName="opacity" values="1;1;0;0" dur="1.1s" repeatCount="indefinite"/></tspan>
  </text>

  <!-- Subtitle -->
  <text x="500" y="176" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif"
        font-size="20" font-weight="600" fill="#c9d3ef" letter-spacing="2">
    Solutions Engineer  &#183;  Polyglot Builder
  </text>

  <!-- Tagline -->
  <text x="500" y="204" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif"
        font-size="13.5" fill="#6b7699" letter-spacing="3">
    LONDON, UK  &#8226;  RUST &#183; TYPESCRIPT &#183; C++ &#183; APEX &#183; PYTHON
  </text>

  <!-- Sweeping scanline -->
  <rect x="-160" y="0" width="160" height="230" fill="#ffffff" opacity="0.04">
    <animateTransform attributeName="transform" type="translate"
      values="0 0; 1160 0" dur="7s" repeatCount="indefinite"/>
  </rect>

  <!-- Accent border -->
  <rect x="1" y="1" width="998" height="228" rx="16" fill="none" stroke="#2b3a67" stroke-width="1.5" stroke-opacity="0.6"/>
</svg>
